name: Dependency Policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-policy:
    uses: thaim/actions/.github/workflows/reusable-dependency-policy.yml@f99ac36b7b68fe3a1c476fd9062b64e4b61199b8 # v1.3.4
